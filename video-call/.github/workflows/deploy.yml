name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1                   # set this to your preferred AWS region
  ECR_REPOSITORY_BE: videocall-backend    # set this to your backend ECR repository name
  ECR_REPOSITORY_FE: videocall-frontend   # set this to your frontend ECR repository name
  ECS_SERVICE: videocall-service          # set this to your ECS service name
  ECS_CLUSTER: videocall-cluster          # set this to your ECS cluster name
  ECS_TASK_DEFINITION: .aws/task-definition.json # path to your task definition file
  CONTAINER_NAME_BE: backend              # name of the backend container in your task definition
  CONTAINER_NAME_FE: frontend             # name of the frontend container in your task definition

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push Backend image to Amazon ECR
      id: build-image-be
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BE:$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_BE:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BE:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build, tag, and push Frontend image to Amazon ECR
      id: build-image-fe
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FE:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_FE:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_FE:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the new Backend image ID in the Amazon ECS task definition
      id: task-def-be
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME_BE }}
        image: ${{ steps.build-image-be.outputs.image }}

    - name: Fill in the new Frontend image ID in the Amazon ECS task definition
      id: task-def-fe
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-be.outputs.task-definition }}
        container-name: ${{ env.CONTAINER_NAME_FE }}
        image: ${{ steps.build-image-fe.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def-fe.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
