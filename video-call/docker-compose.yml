services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videocall-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_PATH=/app/videocall.db
    volumes:
      - db-data:/app
    ports:
      - "8080:8080"
    networks:
      - videocall-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: videocall-frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - videocall-net

networks:
  videocall-net:
    driver: bridge

volumes:
  db-data:
