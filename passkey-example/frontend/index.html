<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBox - Passkey Demo</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="app-container">
        <!-- Notification Toast -->
        <div id="toast" class="toast hidden"></div>

        <!-- View: Login / Register -->
        <div id="view-auth" class="view active">
            <div class="card glass">
                <div class="logo">
                    <!-- Fingerprint / Key Icon -->
                    <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                    <h2>SecureBox</h2>
                </div>
                <p class="subtitle">Log in or create a new account using Passkeys.</p>

                <form id="auth-form" class="form">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" required placeholder="Enter your username" autocomplete="username webauthn">
                    </div>
                    
                    <div class="action-buttons">
                        <button type="button" class="btn btn-primary" id="btn-login">Sign In with Passkey</button>
                        <button type="button" class="btn btn-outline" id="btn-register">Register</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- View: Passkey Setup -->
        <div id="view-passkey-setup" class="view">
            <div class="card glass">
                <div class="icon-header">
                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <h2>Set up Passkey</h2>
                <p class="subtitle">Create a passkey to securely log into your account using your device's biometric sensor (FaceID, TouchID) or screen lock.</p>

                <div class="form">
                    <button type="button" class="btn btn-primary btn-block mt-4" id="btn-setup-passkey">Create Passkey</button>
                    <button type="button" class="btn btn-text btn-block" onclick="logout()">Cancel</button>
                </div>
            </div>
        </div>

        <!-- View: Dashboard -->
        <div id="view-dashboard" class="view">
            <div class="dashboard-header glass">
                <div class="logo">
                     <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    <h2>SecureBox Dashboard</h2>
                </div>
                <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
            </div>
            
            <div class="dashboard-content">
                <div class="card glass wide">
                    <h2>Welcome back! 👋</h2>
                    <p id="dashboard-message" class="text-large text-muted mt-2">Loading...</p>
                    
                    <div class="stats-grid mt-6">
                        <div class="stat-card">
                            <div class="stat-icon secure">
                                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                            </div>
                            <div>
                                <h3>Account Secured</h3>
                                <p>Passkey is active</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SimpleWebAuthn browser library -->
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
